revision: 126
storage:
  path: /workspace/ontology/storage
server:
  host: localhost
  port: 3000
ui:
  pageSize: 20
  defaultView: ""
  autoSave: true
  autoSaveInterval: 30000
  graphState:
    fitEnabled: true
    forceEnabled: true
  filterState:
    views:
      selected: []
      pinned: []
    classes:
      selected:
        - Person
        - Team
      pinned:
        - Person
        - Team
    components:
      selected: []
      pinned: []
views:
  - name: Game Entities
    icon: gamepad-2
    classes:
      - GameEntity
  - name: HR Manager
    icon: users
    classes:
      - Person
      - Team
  - name: IT Operations
    icon: monitor
    classes:
      - System
      - Product
      - Team
chat:
  enabled: true
  defaultAgent: ontologist
  command: cat $BUFFER | subd -i -v -j -t $AGENT go
  agents: {}
  models: []
  modes: []
